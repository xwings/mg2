<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>MG2 - Metal Gear 2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:monospace}
body{display:flex;align-items:center;justify-content:center}
canvas{image-rendering:pixelated;display:block}
#loading{color:#0f0;font-size:14px;text-align:center;position:absolute}
.bar{width:300px;height:16px;border:1px solid #0f0;margin:8px auto}
.fill{height:100%;background:#0f0;width:0%;transition:width .1s}
</style>
</head>
<body>
<div id="loading"><div>Loading MG2...</div><div class="bar"><div class="fill" id="prog"></div></div><div id="stat"></div></div>
<script type="module" src="./src/main.js"></script>
</body>
</html>
